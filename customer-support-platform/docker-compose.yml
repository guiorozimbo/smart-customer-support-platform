version: "3.9"

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: csplatform-sqlserver
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=Your_strong_Password123
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: csplatform-api-gateway
    depends_on:
      - order-service
      - customer-service
      - ticket-service
      - chatbot-integration
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    ports:
      - "5000:8080"

  order-service:
    build:
      context: .
      dockerfile: services/order-service/Dockerfile
    container_name: csplatform-order-service
    depends_on:
      - sqlserver
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=CustomerSupportPlatform;User Id=sa;Password=Your_strong_Password123;TrustServerCertificate=True;MultipleActiveResultSets=true
    ports:
      - "5001:8080"

  customer-service:
    build:
      context: .
      dockerfile: services/customer-service/Dockerfile
    container_name: csplatform-customer-service
    depends_on:
      - sqlserver
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=CustomerSupportPlatform;User Id=sa;Password=Your_strong_Password123;TrustServerCertificate=True;MultipleActiveResultSets=true
    ports:
      - "5002:8080"

  ticket-service:
    build:
      context: .
      dockerfile: services/ticket-service/Dockerfile
    container_name: csplatform-ticket-service
    depends_on:
      - sqlserver
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=CustomerSupportPlatform;User Id=sa;Password=Your_strong_Password123;TrustServerCertificate=True;MultipleActiveResultSets=true
    ports:
      - "5003:8080"

  chatbot-integration:
    build:
      context: .
      dockerfile: chatbot-integration/Dockerfile
    container_name: csplatform-chatbot-integration
    depends_on:
      - sqlserver
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=CustomerSupportPlatform;User Id=sa;Password=Your_strong_Password123;TrustServerCertificate=True;MultipleActiveResultSets=true
    ports:
      - "5004:8080"

volumes:
  sql_data:

